name: iris-status
# Periodic proof-of-life to #the-iris so the channel isn't just silent. Posts a green
# "all healthy" pulse (server online + uptime + config matches approved) on a schedule,
# and red if anything is wrong. Immediate problem-alerts still come from heartbeat-check.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (change to taste)
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Load latest heartbeats from the heartbeat branch
        run: |
          if git fetch origin heartbeat 2>/dev/null; then
            git checkout origin/heartbeat -- heartbeat 2>/dev/null || true
          fi
      - name: Post status to #the-iris
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import calendar, glob, json, os, time, urllib.request

          def post(title, desc, color):
              url = os.environ.get("DISCORD_WEBHOOK_URL", "")
              if not url:
                  print("no webhook set"); return
              body = {"embeds": [{"title": title, "description": desc, "color": color}]}
              try:
                  urllib.request.urlopen(urllib.request.Request(
                      url, data=json.dumps(body).encode(),
                      headers={"Content-Type": "application/json", "User-Agent": "RageQuit-Iris/1.0"}),
                      timeout=15)
              except Exception:
                  print("discord post failed (network or webhook error)")

          def approved_for(g):
              ap = os.path.join("games", g, "config", "approved.sha256")
              if os.path.exists(ap):
                  for line in open(ap):
                      line = line.strip()
                      if line and not line.startswith("#"):
                          return line
              return None

          def uptime(started):
              if not started:
                  return ""
              try:
                  s = started.replace("Z", "").split(".")[0]
                  secs = int(time.time()) - calendar.timegm(time.strptime(s, "%Y-%m-%dT%H:%M:%S"))
                  secs = max(secs, 0)
                  d, r = divmod(secs, 86400); h, r = divmod(r, 3600); mi = r // 60
                  return ((f"{d}d " if d else "") + (f"{h}h " if (h or d) else "") + f"{mi}m").strip()
              except Exception:
                  return ""

          MAX_AGE = 1800
          now = int(time.time())
          games = [os.path.basename(d.rstrip("/")) for d in glob.glob("games/*/")
                   if not os.path.basename(d.rstrip("/")).startswith("_")]

          lines = []; all_ok = True
          for g in sorted(games):
              hb_path = os.path.join("heartbeat", g + ".json")
              if not os.path.exists(hb_path):
                  lines.append(f"• **{g}**: ⚠️ no heartbeat yet"); all_ok = False; continue
              hb = json.load(open(hb_path))
              if hb.get("status") == "not-started":
                  lines.append(f"• **{g}**: ⏳ not deployed yet"); continue
              age = now - int(hb.get("ts", 0))
              fresh = age <= MAX_AGE
              approved = approved_for(g)
              hash_ok = (not approved or approved == "REPLACE_AFTER_FIRST_DEPLOY"
                         or hb.get("runtime_config_sha256") == approved)
              running = hb.get("server_running", hb.get("status") == "ok")
              up = uptime(hb.get("server_started", ""))
              online = f"🟢 online (up {up})" if running and up else ("🟢 online" if running else "🔴 **OFFLINE**")
              if running and fresh and hb.get("status") == "ok" and hash_ok:
                  lines.append(f"• **{g}**: {online} · 🔒 admin locked · config matches approved · checked {age//60}m ago")
              else:
                  all_ok = False
                  why = []
                  if not running: why.append("server OFFLINE")
                  if not fresh: why.append(f"heartbeat stale ({age//60}m)")
                  if running and hb.get("status") != "ok": why.append(f"status={hb.get('status')}")
                  if not hash_ok: why.append("config DRIFT vs approved")
                  lines.append(f"• **{g}**: {online} — 🔴 " + ", ".join(why))

          stamp = time.strftime("%Y-%m-%d %H:%M UTC", time.gmtime())
          if all_ok:
              post("✅ The Iris — all servers healthy",
                   "\n".join(lines) +
                   f"\n\nAdmin remains disabled on every server and nothing has changed.\n"
                   f"_Checked {stamp}. Automated proof-of-life — posts on a schedule so you can see the audit is live._",
                   0x2ECC71)
          else:
              post("⚠️ The Iris — attention needed",
                   "\n".join(lines) + f"\n\n_Checked {stamp}._", 0xE01E1E)
          print("posted; all_ok =", all_ok)
          PY
