services:
  palworld:
    image: ${PALWORLD_IMAGE}
    container_name: palworld
    restart: unless-stopped
    stop_grace_period: 30s
    # All gameplay + admin settings come from the git-tracked game.env.
    # game.local.env (gitignored, host-only) may override with PRIVATE values like
    # SERVER_PASSWORD — it never enters the public repo. Optional, so deploys work
    # without it.
    env_file:
      - path: game.env
        required: true
      - path: game.local.env
        required: false
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - PORT=${GAME_PORT}
      - TZ=${TZ}
    ports:
      - "${GAME_PORT}:8211/udp"
      - "${QUERY_PORT}:27015/udp"
      # NOTE: RCON (25575) and the REST API (8212) are deliberately NOT published.
      # Even if something flipped them on, they aren't reachable from outside.
    volumes:
      # Persist the WHOLE game install so config changes don't re-download the ~5GB
      # game. The live PalWorldSettings.ini lands under
      # ${SAVE_DIR}/Pal/Saved/Config/LinuxServer/ where the watcher reads it.
      - "${SAVE_DIR}:/palworld"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "pgrep", "-f", "PalServer"]
      interval: 60s
      timeout: 10s
      retries: 3
